<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fahrzeugstatus</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f0f2f5; min-height: 100vh; }
    .status-icon { font-size: 5rem; display: block; margin-bottom: 1rem; }
    .status-card { border: none; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.12); max-width: 480px; margin: 0 auto; }
    .status-header { border-radius: 20px 20px 0 0; padding: 2rem; text-align: center; }
    .status-angenommen .status-header { background: linear-gradient(135deg, #ffc107, #ff8f00); color: white; }
    .status-in_bearbeitung .status-header { background: linear-gradient(135deg, #1976d2, #0d47a1); color: white; }
    .status-wartet_auf_teile .status-header { background: linear-gradient(135deg, #e53935, #b71c1c); color: white; }
    .status-fertig .status-header { background: linear-gradient(135deg, #43a047, #1b5e20); color: white; }
    .status-abgeholt .status-header { background: linear-gradient(135deg, #757575, #424242); color: white; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.85;transform:scale(1.05)} }
    .fertig-pulse { animation: fertig-pulse 1.5s ease-in-out infinite; }
    @keyframes fertig-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.9;transform:scale(1.08)} }
    .datenschutz { font-size: .75rem; color: #6c757d; max-width: 480px; margin: 1rem auto; text-align: center; padding: 0 1rem; }
    .refresh-hint { font-size: .8rem; }
  </style>
</head>
<body class="py-4">
  <div class="container" id="app">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Lade Status...</p>
    </div>
  </div>

  <script>
    const token = location.pathname.split('/status/')[1];

    const STATUS_CONFIG = {
      angenommen: {
        icon: 'bi-clock-history',
        label: 'Angenommen',
        desc: 'Ihr Fahrzeug wurde entgegengenommen und wird bald bearbeitet.',
        anim: 'pulse',
      },
      in_bearbeitung: {
        icon: 'bi-tools',
        label: 'In Bearbeitung',
        desc: 'Ihr Fahrzeug wird aktuell von unseren Fachleuten bearbeitet.',
        anim: 'pulse',
      },
      wartet_auf_teile: {
        icon: 'bi-box-seam',
        label: 'Wartet auf Ersatzteile',
        desc: 'Wir warten auf die Lieferung benötigter Ersatzteile.',
        anim: '',
      },
      fertig: {
        icon: 'bi-check-circle-fill',
        label: 'Fertig zum Abholen!',
        desc: 'Ihr Fahrzeug ist fertig und kann jetzt abgeholt werden.',
        anim: 'fertig-pulse',
      },
      abgeholt: {
        icon: 'bi-car-front-fill',
        label: 'Abgeholt',
        desc: 'Ihr Fahrzeug wurde abgeholt. Vielen Dank für Ihr Vertrauen!',
        anim: '',
      },
    };

    function formatDate(dateStr) {
      if (!dateStr) return null;
      return new Date(dateStr).toLocaleDateString('de-DE', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return null;
      return new Date(dateStr).toLocaleString('de-DE', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadStatus() {
      try {
        const res = await fetch(`/api/status/${token}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Auftrag nicht gefunden');
        }
        const data = await res.json();
        renderStatus(data);
      } catch (e) {
        document.getElementById('app').innerHTML = `
          <div class="text-center py-5 px-3">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size:4rem"></i>
            <h4 class="mt-3">Auftrag nicht gefunden</h4>
            <p class="text-muted">${e.message}</p>
            <p class="text-muted small">Bitte wenden Sie sich an Ihre Werkstatt.</p>
          </div>`;
      }
    }

    function renderStatus(data) {
      const cfg = STATUS_CONFIG[data.status] || STATUS_CONFIG.angenommen;
      const showPickup = data.abhol_datum && data.status !== 'abgeholt';
      const showFertigDate = data.status === 'fertig' && data.fertig_datum;

      document.title = `${cfg.label} – ${data.werkstatt}`;

      document.getElementById('app').innerHTML = `
        <div class="status-card card status-${data.status} mb-3">
          <div class="status-header">
            <i class="bi ${cfg.icon} status-icon ${cfg.anim}"></i>
            <h3 class="fw-bold mb-1">${cfg.label}</h3>
            <p class="mb-0 opacity-90">${data.fahrzeug}</p>
          </div>
          <div class="card-body p-4">
            <p class="text-muted mb-3">${cfg.desc}</p>

            ${showPickup ? `
            <div class="alert alert-info d-flex align-items-start gap-2 mb-3">
              <i class="bi bi-calendar-check fs-5 mt-1"></i>
              <div>
                <strong>Geplantes Abholdatum</strong><br>
                ${formatDate(data.abhol_datum)}
              </div>
            </div>` : ''}

            ${showFertigDate ? `
            <div class="alert alert-success d-flex align-items-start gap-2 mb-3">
              <i class="bi bi-check2-circle fs-5 mt-1"></i>
              <div>
                <strong>Fertig seit</strong><br>
                ${formatDateTime(data.fertig_datum)}
              </div>
            </div>` : ''}

            <div class="border-top pt-3 mt-3">
              <div class="d-flex justify-content-between align-items-center">
                <small class="text-muted refresh-hint">
                  <i class="bi bi-arrow-clockwise me-1"></i>
                  Zuletzt aktualisiert: ${formatDateTime(data.aktualisiert)}
                </small>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadStatus()">
                  <i class="bi bi-arrow-clockwise"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="text-center mb-3">
          <small class="text-muted"><i class="bi bi-building me-1"></i>${data.werkstatt}</small>
        </div>

        <div class="datenschutz">
          <i class="bi bi-shield-check me-1"></i>
          <strong>Datenschutzhinweis:</strong> Diese Seite zeigt ausschließlich den Bearbeitungsstatus Ihres Fahrzeugs.
          Es werden keine personenbezogenen Daten gespeichert oder an Dritte weitergegeben.
          Die Daten werden nach 30 Tagen automatisch gelöscht.
          <a href="/datenschutz" class="text-decoration-none">Datenschutzerklärung</a>
        </div>
      `;
    }

    loadStatus();
  </script>
</body>
</html>
