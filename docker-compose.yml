services:
  app:
    build: .
    container_name: werkstatt-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - werkstatt-data:/data
    networks:
      - werkstatt-net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: werkstatt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - werkstatt-net
    depends_on:
      - app

volumes:
  werkstatt-data:

networks:
  werkstatt-net:
    driver: bridge
